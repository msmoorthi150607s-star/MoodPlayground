<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Playground | Loki Technologies</title>
    <meta name="description" content="A professional, playful mood detection website that adapts to your emotions.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>

<body class="mood-default">
    <div id="wallpaper-overlay"></div>
    <div class="particles" id="particles"></div>

    <main class="container">
        <header class="header">
            <h1 class="logo">Mood Playground <span class="brand">by Loki Technologies</span></h1>
            <div class="language-switcher">
                <button class="lang-btn active" data-lang="ta">தமிழ்</button>
                <button class="lang-btn" data-lang="en">English</button>
            </div>
        </header>

        <section class="hero">
            <div class="ai-assistant-container">
                <div class="ai-assistant-visual">
                    <div class="ai-avatar" id="ai-logo">
                        <span></span><span></span><span></span><span></span><span></span><span></span>
                    </div>
                </div>
                <div class="ai-chat-bubble" id="ai-response">
                    <p>Hello! I'm your companion. How are you feeling today?</p>
                </div>
            </div>

            <div class="mood-input-container">
                <div class="mood-selector">
                    <button class="mood-btn" data-mood="happy" aria-label="Happy">😀</button>
                    <button class="mood-btn" data-mood="sad" aria-label="Sad">😢</button>
                    <button class="mood-btn" data-mood="romantic" aria-label="Romantic">😍</button>
                    <button class="mood-btn" data-mood="energetic" aria-label="Energetic">😎</button>
                    <button class="mood-btn" data-mood="relaxed" aria-label="Relaxed">😌</button>
                    <button class="mood-btn" data-mood="angry" aria-label="Angry">😠</button>
                    <button class="mood-btn" data-mood="alone" aria-label="Alone">👤</button>
                    <button class="mood-btn" data-mood="motivation" aria-label="Motivation">🔥</button>
                    <button class="mood-btn" data-mood="devotional" aria-label="Devotional">🙏</button>
                </div>

                <div class="input-actions">
                    <input type="text" id="mood-text-input" placeholder="Type your mood here..." autocomplete="off">
                    <button id="voice-input-btn" class="icon-btn" title="Speak your mood">🎤</button>
                </div>

                <div class="discovery-container">
                    <button id="mood-discovery-btn" class="discovery-btn">
                        <span class="sparkle">✨</span> Find Your Mood with Me
                    </button>
                    <div id="discovery-options" class="discovery-options-grid"></div>
                </div>
            </div>

            <section class="quotes-section" id="quotes-display">
                <div class="quote-card">
                    <span class="quote-icon">“</span>
                    <p id="mood-quote">Your mood defines your day. Choose a vibe to begin.</p>
                    <span class="quote-author" id="quote-author">— Loki Technologies</span>
                </div>
            </section>
        </section>

        <div id="situation-section" class="situation-container hidden">
            <button id="situation-video-btn" class="situation-btn">
                <span class="sparkle">🎬</span> See Your Situation Videos
            </button>
        </div>

        <footer class="player-bar" id="music-player">
            <div class="now-playing">
                <span class="music-icon">🎵</span>
                <div class="song-info">
                    <span id="song-title">Select a mood to play music</span>
                    <small id="mood-label">Current Mood: Normal</small>
                </div>
            </div>
            <div class="player-controls">
                <button id="prev-btn" class="icon-btn" title="Previous Song">⏮️</button>
                <button id="play-pause-btn" class="icon-btn" title="Play/Pause">⏸️</button>
                <button id="next-btn" class="icon-btn" title="Next Song">⏭️</button>
                <audio id="audio-player"></audio>
                <div class="visualizer-mini">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
            </div>
        </footer>

        <!-- Video Modal -->
        <div id="video-modal" class="video-modal">
            <div class="modal-content">
                <button id="close-modal" class="close-btn">&times;</button>
                <div class="video-wrapper">
                    <video id="situation-video"></video>
                </div>
                <div class="video-player-controls">
                    <button id="video-prev-btn" class="video-ctrl-btn" title="Previous Video">⏮️</button>
                    <button id="video-play-pause-btn" class="video-ctrl-btn" title="Play/Pause">⏸️</button>
                    <button id="video-next-btn" class="video-ctrl-btn" title="Next Video">⏭️</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
